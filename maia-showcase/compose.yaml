services:
  postgres:
    image: postgres:17
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - maia_db:/var/lib/postgresql/maia/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: huh_db
  pgadmin:
    image: dpage/pgadmin4
    restart: always
    ports:
      - "8889:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ops@maiaframework.org
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - pgadmin-data:/var/lib/maia/pgadmin
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.4
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=maia_elastic_password
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
volumes:
  maia_db:
  pgadmin-data:
