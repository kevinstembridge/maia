<app-page-layout pageTitle="Edit Some Versioned" dataPageId="some_versioned_edit">

        <div class="edit-form-container">
            <app-some-versioned-entity-edit-form

                (onCancel)="onCancelClicked()"
            />

    }
</app-page-layout>
