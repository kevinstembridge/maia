<app-page-layout pageTitle="Edit Alpha" dataPageId="alpha_edit">
    @if (entityId(); as id) {
        <div class="edit-form-container">
            <app-alpha-entity-edit-form
                [entityId]="id"
                (onSave)="onSaveClicked()"
                (onCancel)="onCancelClicked()"
            />
        </div>
    }
</app-page-layout>
