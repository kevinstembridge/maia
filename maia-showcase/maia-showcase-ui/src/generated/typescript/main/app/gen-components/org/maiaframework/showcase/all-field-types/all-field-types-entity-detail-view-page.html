<app-page-layout pageTitle="All Field Types" dataPageId="all_field_types_view">
    @if (entityId(); as id) {
        <app-all-field-types-entity-detail-view [entityId]="id" />
    }
    <button matButton aria-label="Blotter" (click)="onBlotterClicked()">
        <mat-icon>list</mat-icon>
        Go to Blotter
    </button>
    @if (canEdit && entityId()) {
        <button matButton aria-label="Edit" (click)="onEditClicked()">
            <mat-icon>edit</mat-icon>
            Edit
        </button>
    }
</app-page-layout>
