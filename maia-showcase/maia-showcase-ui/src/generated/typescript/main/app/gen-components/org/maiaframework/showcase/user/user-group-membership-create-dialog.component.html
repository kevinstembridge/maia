<h1 mat-dialog-title>Create</h1>
<form [formGroup]="formGroup" novalidate (ngSubmit)="onSubmit()">
    <div mat-dialog-content>
        @if (problemDetail()) {
            <p class="alert alert-warning" role="alert">{{ problemDetail()!.title }}</p>
        }
        <mat-form-field appearance="outline">
            <mat-label>Effective From Date</mat-label>
            <input
                matInput
                [matDatepicker]="effectiveFromPicker"
                formControlName="effectiveFrom"
                name="effectiveFrom"
            />
            <mat-datepicker-toggle matIconSuffix [for]="effectiveFromPicker"></mat-datepicker-toggle>
            <mat-datepicker #effectiveFromPicker></mat-datepicker>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Effective From Time</mat-label>
            <input
                matInput
                [matTimepicker]="effectiveFromTimepicker"
                formControlName="effectiveFrom"
                name="effectiveFromTime"
            />
            <mat-timepicker #effectiveFromTimepicker></mat-timepicker>
            <mat-timepicker-toggle matSuffix [for]="effectiveFromTimepicker"></mat-timepicker-toggle>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Effective To Date</mat-label>
            <input
                matInput
                [matDatepicker]="effectiveToPicker"
                formControlName="effectiveTo"
                name="effectiveTo"
            />
            <mat-datepicker-toggle matIconSuffix [for]="effectiveToPicker"></mat-datepicker-toggle>
            <mat-datepicker #effectiveToPicker></mat-datepicker>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Effective To Time</mat-label>
            <input
                matInput
                [matTimepicker]="effectiveToTimepicker"
                formControlName="effectiveTo"
                name="effectiveToTime"
            />
            <mat-timepicker #effectiveToTimepicker></mat-timepicker>
            <mat-timepicker-toggle matSuffix [for]="effectiveToTimepicker"></mat-timepicker-toggle>
        </mat-form-field>
    </div>
    <div mat-dialog-actions>
        <button mat-flat-button type="submit" color="primary">Submit</button>
        <button mat-flat-button type="button" (click)="onCancel()">Cancel</button>
    </div>
</form>
