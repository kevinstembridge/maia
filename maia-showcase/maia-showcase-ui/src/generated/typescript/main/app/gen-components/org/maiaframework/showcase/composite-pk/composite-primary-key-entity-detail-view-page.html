<app-page-layout pageTitle="Composite Primary Key" dataPageId="composite_primary_key_view">
    @if (entityId(); as id) {
        <app-composite-primary-key-entity-detail-view [entityId]="id" />
    }
    @if (canEdit && entityId()) {
        <button matButton aria-label="Edit" (click)="onEditClicked()">
            <mat-icon>edit</mat-icon>
            Edit
        </button>
    }
</app-page-layout>
