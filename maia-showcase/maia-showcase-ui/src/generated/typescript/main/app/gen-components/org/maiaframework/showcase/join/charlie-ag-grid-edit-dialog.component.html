<h1 mat-dialog-title>Edit</h1>

@if (loading()) {
    <div mat-dialog-content style="display: flex; justify-content: center; padding: 24px;">
        <mat-spinner diameter="40"></mat-spinner>
    </div>
} @else {
<form [formGroup]="formGroup" novalidate (ngSubmit)="onSubmit()">
    <div mat-dialog-content>
        @if (problemDetail()) {
            <p class="alert alert-warning" role="alert">{{ problemDetail()!.title }}</p>
        }
        <mat-form-field appearance="outline">
            <mat-label>Bravo</mat-label>
            <input
                formControlName="bravo"
                name="bravo"
                type="text"
                matInput
            />
            @if (formGroup.controls['bravo'].hasError('required')) {
                <mat-error>Bravo is required.</mat-error>
            }
        </mat-form-field>
    </div>
    <div mat-dialog-actions>
        <button mat-flat-button type="submit" color="primary">Submit</button>
        <button mat-flat-button type="button" (click)="onCancel()">Cancel</button>
    </div>
</form>
}
