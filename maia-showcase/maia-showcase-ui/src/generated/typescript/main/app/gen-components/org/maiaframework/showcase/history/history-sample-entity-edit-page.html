<app-page-layout pageTitle="Edit History Sample" dataPageId="history_sample_edit">
    @if (entityId(); as id) {
        <div class="edit-form-container">
            <app-history-sample-entity-edit-form
                [entityId]="id"
                (onSave)="onSaveClicked()"
                (onCancel)="onCancelClicked()"
            />
        </div>
    }
</app-page-layout>
