<app-page-layout pageTitle="Edit Simple" dataPageId="simple_edit">
    @if (entityId(); as id) {
        <div class="edit-form-container">
            <app-simple-entity-edit-form
                [entityId]="id"
                (onSave)="onSaveClicked()"
                (onCancel)="onCancelClicked()"
            />
        </div>
    }
</app-page-layout>
