<app-page-layout pageTitle="Edit Left Many" dataPageId="left_many_edit">
    @if (entityId(); as id) {
        <div class="edit-form-container">
            <app-left-many-entity-edit-form
                [entityId]="id"
                (onSave)="onSaveClicked()"
                (onCancel)="onCancelClicked()"
            />
        </div>
    }
</app-page-layout>
