<mat-toolbar color="primary" role="banner">
    <button
        mat-icon-button
        class="md:hidden"
        aria-label="Toggle navigation menu"
        (click)="toggleMenu()"
    >
        <mat-icon>{{ menuOpen() ? 'close' : 'menu' }}</mat-icon>
    </button>

    <span class="ml-2 text-xl font-medium md:ml-0">{{ title() }}</span>

    <span class="flex-1" aria-hidden="true"></span>

    <nav class="hidden gap-1 md:flex" aria-label="Main navigation">
        <a mat-button routerLink="/">Home</a>
        <a mat-button routerLink="/simple">Simple</a>
    </nav>
</mat-toolbar>

@if (menuOpen()) {
    <nav
        class="flex flex-col bg-(--mat-toolbar-container-background-color) text-white md:hidden"
        aria-label="Mobile navigation"
    >
        <a mat-button routerLink="/" (click)="toggleMenu()">Home</a>
        <a mat-button routerLink="/simple" (click)="toggleMenu()">Simple</a>
    </nav>
}

<main>
    <router-outlet />
</main>
