<mat-toolbar color="primary" role="banner">
    <button matIconButton [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
        <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
        @if (hasReadAuthority()) {
            <button mat-menu-item routerLink="/simple">
                <mat-icon>dialpad</mat-icon>
                <span>Simple</span>
            </button>
        }
        @if (hasReadAuthority()) {
            <button mat-menu-item routerLink="/all-field-types">
                <mat-icon>dialpad</mat-icon>
                <span>All Field Types</span>
            </button>
        }
        @if (hasReadAuthority()) {
            <button mat-menu-item routerLink="/some-versioned">
                <mat-icon>dialpad</mat-icon>
                <span>Some Versioned</span>
            </button>
        }
        @if (hasReadAuthority()) {
            <button mat-menu-item routerLink="/composite-pk">
                <mat-icon>dialpad</mat-icon>
                <span>Composite PK</span>
            </button>
        }
        @if (hasReadAuthority()) {
            <button mat-menu-item routerLink="/users">
                <mat-icon>people</mat-icon>
                <span>Users</span>
            </button>
        }
        @if (hasReadAuthority()) {
            <button mat-menu-item routerLink="/left-many-searchable">
                <mat-icon>dialpad</mat-icon>
                <span>Left Many to Many</span>
            </button>
        }
        @if (hasSysOpsAuthority()) {
            <button mat-menu-item routerLink="/jobs-dashboard">
                <mat-icon>storage</mat-icon>
                <span>Jobs Dashboard</span>
            </button>
            <button mat-menu-item routerLink="/elastic-indices">
                <mat-icon>storage</mat-icon>
                <span>Elastic Indices</span>
            </button>
        }
    </mat-menu>

    <span class="ml-2 text-xl font-medium md:ml-0">{{ title() }}</span>

    <span class="flex-1" aria-hidden="true"></span>

    @if (isLoggedIn()) {
        <button mat-button (click)="logout()">Logout</button>
    } @else {
        <a mat-button routerLink="/login">Login</a>
    }

</mat-toolbar>

<main>
    <router-outlet />
</main>
