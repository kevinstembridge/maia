<app-page-layout pageTitle="Simple" dataPageId="simple_view">
    @if (canEdit && entityId()) {
        <button mat-icon-button aria-label="Edit" (click)="onEditClicked()">
            <mat-icon>edit</mat-icon>
        </button>
    }
    @if (entityId(); as id) {
        <app-simple-entity-detail-view [entityId]="id" />
    }
</app-page-layout>
