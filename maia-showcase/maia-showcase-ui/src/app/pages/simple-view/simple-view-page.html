<app-page-layout pageTitle="Simple" dataPageId="simple_view">
    @if (dto(); as data) {
        <dl class="simple-view-fields">
            <div class="simple-view-field">
                <dt>Some String</dt>
                <dd>{{ data.someString }}</dd>
            </div>
            <div class="simple-view-field">
                <dt>Created</dt>
                <dd>{{ data.createdTimestampUtc }}</dd>
            </div>
            <div class="simple-view-field">
                <dt>ID</dt>
                <dd>{{ data.id }}</dd>
            </div>
        </dl>
    }
</app-page-layout>
