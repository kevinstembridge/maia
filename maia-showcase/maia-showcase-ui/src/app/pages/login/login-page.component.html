<section class="flex min-h-screen flex-col items-center justify-center p-8">
    <div class="w-full max-w-sm">
        <h1 class="mb-6 text-3xl font-semibold">Log In</h1>

        @if (accountLocked()) {
            <div class="mb-4">
                <p class="rounded border border-yellow-400 bg-yellow-50 p-4 text-yellow-800" role="alert">Your email address has not been verified yet.</p>
                <p>Click to <a routerLink="/register/request_email_address_token">request a verification code</a>.</p>
            </div>
        }
        @if (badCredentials()) {
            <div class="mb-4">
                <p class="rounded border border-red-400 bg-red-50 p-4 text-red-800" role="alert">Incorrect email address or password.</p>
            </div>
        }
        <app-login-form (onFormSubmission)="handleFormSubmission($event)" />
    </div>
</section>
